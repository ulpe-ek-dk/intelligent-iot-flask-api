# Lokalt udviklingsmiljø – bygger image fra kildekode og eksponerer DB
services:
  api:
    build: .                  # Byg fra Dockerfile i stedet for at pulle image
    image: intelligent-iot-flask-api:latest
    volumes:
      - .:/app                # Hot-reload: kodeændringer slår igennem uden rebuild
    command: ["gunicorn", "--bind", "0.0.0.0:5000", "--workers", "2", "--worker-tmp-dir", "/tmp", "--reload", "app:app"]
    # Gunicorn 25.x viser "Control server error" på macOS/Docker – det er harmløst og kan ignoreres
    # --reload: genstarter workers automatisk når kode ændres (kun til udvikling)
    environment:
      FLASK_DEBUG: "true"

  db:
    ports:
      - "${DB_EXTERNAL_PORT:-3307}:3306"   # Eksponer DB så man kan kigge med MySQL Workbench
