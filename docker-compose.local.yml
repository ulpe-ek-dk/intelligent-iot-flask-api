# Lokalt udviklingsmiljø
services:
  api:
    build: .
    ports:
      - "5000:5000"
    environment:
      FLASK_DEBUG: "true"
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: flask_demo
      DB_USER: appuser
      DB_PASSWORD: rootpassword
    depends_on:
      - db

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: flask_demo
      MYSQL_USER: appuser
      MYSQL_PASSWORD: rootpassword
    ports:
      - "3307:3306"
    volumes:
      - ./mysql-init:/docker-entrypoint-initdb.d