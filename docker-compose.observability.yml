# Observability stack – tilføj til eksisterende compose setup
# Brug:
#   docker compose -f docker-compose.yml -f docker-compose.local.yml -f docker-compose.observability.yml up
#
# Eller uden local (CI/produktion):
#   docker compose -f docker-compose.yml -f docker-compose.observability.yml up

services:
  mysqld-exporter:
    image: prom/mysqld-exporter:latest
    container_name: ${COMPOSE_PROJECT_NAME:-iot}_mysqld_exporter
    restart: always
    command:
      - "--mysqld.address=db:3306"
      - "--mysqld.username=root"
    environment:
      MYSQLD_EXPORTER_PASSWORD: ${DB_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "9104:9104"

  prometheus:
    image: prom/prometheus:latest
    container_name: ${COMPOSE_PROJECT_NAME:-iot}_prometheus
    restart: always
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - api
      - mysqld-exporter

  grafana:
    image: grafana/grafana:latest
    container_name: ${COMPOSE_PROJECT_NAME:-iot}_grafana
    restart: always
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  grafana_data: